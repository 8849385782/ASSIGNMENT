<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Display Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="product-grid">
        <!-- Card 1: Links to watch.html -->
        <a href="watch.html" class="product-card">
            <div class="img-container"><span>⌚</span></div>
            <div class="card-content">
                <h3 class="product-title">Minimalist Watch</h3>
                <p class="product-price">$149.00</p>
            </div>
        </a>

        <!-- Card 2: Links to headphones.html -->
        <a href="headphones.html" class="product-card">
            <div class="img-container"><span>🎧</span></div>
            <div class="card-content">
                <h3 class="product-title">Over-ear Headphone</h3>
                <p class="product-price">$299.00</p>
            </div>
        </a>

        <!-- Card 3: Links to sneakers.html -->
        <a href="sneakers.html" class="product-card">
            <div class="img-container"><span>👟</span></div>
            <div class="card-content">
                <h3 class="product-title">Athletic Sneakers</h3>
                <p class="product-price">$120.00</p>
            </div>
        </a>
    </div>

</body>
</html>

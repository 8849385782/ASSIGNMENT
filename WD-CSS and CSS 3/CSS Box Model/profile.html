<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
      font-family: Arial;
    }

    .container {
      margin-top: 80px;
    }

    .profile-card {
      width: 340px;
      border-radius: 12px;
      border: 2px solid #ddd;
      box-sizing: border-box;
      text-align: center;
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid #0d6efd;
      padding: 4px;
      box-sizing: border-box;
      margin-top: 15px;
    }

    .bio {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #f9f9f9;
      font-size: 14px;
      margin: 10px;
    }
  </style>
</head>

<body>

<div class="container d-flex justify-content-center">

  <div class="card profile-card shadow">

    <div class="card-header bg-primary text-white">
      Portfolio Profile
    </div>

    <div class="card-body">

      <img src="image1.png" class="profile-img">

      <h4>John Doe</h4>

      <p class="bio">
        Frontend Developer | Bootstrap Designer | UI/UX Enthusiast
      </p>

      <!-- BUTTON GOES TO ANOTHER PAGE -->
      <form action="follow success.html">
        <button type="submit" class="btn btn-primary">
          Follow
        </button>
      </form>

    </div>

  </div>

</div>

</body>
</html>

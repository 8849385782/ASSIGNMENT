<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Success Page</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #eef3ff;
}

/* Center message */
.box {
  margin-top: 200px;
  text-align: center;
}

/* SUCCESS MESSAGE BOX */
.message {
  display: inline-block;
  padding: 20px;
  border: 2px solid green;
  color: green;
  font-weight: bold;
  border-radius: 10px;
  background: #eaffea;
}
</style>

</head>

<body>

<div class="box">
  <div class="message">
    ✔ Following successfully
  </div>
</div>

</body>
</html>

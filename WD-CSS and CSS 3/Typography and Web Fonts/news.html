<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Chronicle - Live Wire Stream</title>
    <!-- Linking the clean separate CSS layout sheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Upper Brand Navigation Layout Block -->
    <nav class="navbar">
        <a href="index.html" class="brand-logo">THE <span>CHRONICLE</span></a>
        <div style="font-size: 14px; font-weight: 600; color: #94a3b8;">📡 Public News Wire</div>
    </nav>

    <!-- Main Central Application Display Window -->
    <main class="container">
        
        <div class="section-header">
            <h2 class="section-title">Live Editorial Feed</h2>
            <!-- Trigger button element for loading online Google News dispatches -->
            <button id="load-news-trigger" class="fetch-news-btn">
                <span>🔄</span> Click to Load Live Google News
            </button>
        </div>

        <!-- Target Ingest Feed Loop Holder Container -->
        <div class="news-feed-wrapper" id="live-wire-stream-box">
            <div style="text-align: center; padding: 40px; background: white; border-radius: 8px; border: 1px dashed #cbd5e1; color: #64748b;">
                <p style="font-size: 18px; font-weight: 600; margin-bottom: 5px;">System Idle Mode</p>
                <p style="font-size: 14px;">Ensure your device is connected online, then click the upper loading button to ingest live feeds.</p>
            </div>
        </div>

    </main>

    <!-- Lower Static Ground Footer Frame -->
    <footer class="footer">
        <p>&copy; 2026 The Chronicle Media Group. Linked to Live Google RSS News Repositories.</p>
    </footer>

    <!-- Asynchronous Engine Splicing Controller Logic Script -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const loadBtn = document.getElementById("load-news-trigger");
            const streamBox = document.getElementById("live-wire-stream-box");

            // Attach asynchronous network pipeline requests straight to the click event loop
            loadBtn.addEventListener("click", () => {
                // Update button layout visual characteristics during online data processing operations
                loadBtn.disabled = true;
                loadBtn.style.opacity = "0.7";
                loadBtn.innerHTML = "<span>⏳</span> Syncing Satellites...";
                
                streamBox.innerHTML = `
                    <div style="text-align:center; padding:30px; color:#2563eb; font-weight:600;">
                        Fetching active data streams from Google News networks...
                    </div>
                `;

                // Uses an open secure RSS-to-JSON parsing utility pipeline network to stream authentic top technology briefs from Google News
                const googleNewsFeedTarget = "https://rss2json.com";

                fetch(googleNewsFeedTarget)
                    .then(response => {
                        if (!response.ok) throw new Error("Server transmission error");
                        return response.json();
                    })
                    .then(data => {
                        // Restore interactive button metrics back to active states
                        loadBtn.disabled = false;
                        loadBtn.style.opacity = "1";
                        loadBtn.innerHTML = "<span>🔄</span> Refresh Live News";

                        if(data.status === 'ok' && data.items.length > 0) {
                            streamBox.innerHTML = ""; // Clear baseline tracking window frames

                            // Iterate and draw out individual news modules for the first 5 incoming items
                            data.items.slice(0, 5).forEach(item => {
                                const articleCardNode = document.createElement("div");
                                articleCardNode.className = "news-card";

                                // Clean up trailing company branding labels appended inside Google News title strings
                                const titleSegments = item.title.split(" - ");
                                const headlineText = titleSegments[0];
                                const publisherName = item.author || titleSegments[1] || "Google News Wire";

                                articleCardNode.innerHTML = `
                                    <h3>${escapeHTML(headlineText)}</h3>
                                    <p>Global journalism update retrieved directly from the live public indexing server coordinates via satellite query parameters.</p>
                                    <div class="news-meta-row">
                                        <span>Agency Source: <strong style="color:#0f172a;">${escapeHTML(publisherName)}</strong></span>
                                        <a href="${item.link}" target="_blank" class="news-link-btn">Read Official Document →</a>
                                    </div>
                                `;
                                streamBox.appendChild(articleCardNode);
                            });
                        } else {
                            showErrorState("No data assets found matching the wire configuration profile.");
                        }
                    })
                    .catch(() => {
                        loadBtn.disabled = false;
                        loadBtn.style.opacity = "1";
                        loadBtn.innerHTML = "<span>🔄</span> Try Connecting Again";
                        showErrorState("Network connection timeout. Please check your internet connectivity or firewall rules.");
                    });
            });

            function showErrorState(msg) {
                streamBox.innerHTML = `
                    <div style="background:#fef2f2; border:1px solid #fca5a5; color:#991b1b; padding:15px; border-radius:6px; font-weight:600; text-align:center;">
                        ❌ Error: ${escapeHTML(msg)}
                    </div>
                `;
            }

            function escapeHTML(str) {
                return str.replace(/[&<>'"]/g, 
                    tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
                );
            }
        });
    </script>
</body>
</html>

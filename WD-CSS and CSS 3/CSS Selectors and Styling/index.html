<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h2 class="form-title">Contact Us</h2>

        <!-- Uses default GET action to pass text parameters safely inside the browser URL structure -->
        <form action="success.html" method="GET">
            
            <div class="form-group">
                <label class="form-label">Name</label>
                <!-- Added critical name parameter attribute -->
                <input type="text" name="userName" class="form-input" placeholder="Enter Name" required>
            </div>

            <div class="form-group">
                <label class="form-label">Email</label>
                <!-- Added critical name parameter attribute -->
                <input type="email" name="userEmail" class="form-input" placeholder="Enter Email" required>
            </div>

            <div class="form-group">
                <label class="form-label">Message</label>
                <!-- Added critical name parameter attribute -->
                <textarea name="userMessage" class="form-input textarea" placeholder="Type message..." required></textarea>
            </div>

            <button type="submit" class="action-btn">Send Message</button>
        </form>
    </div>

</body>
</html>

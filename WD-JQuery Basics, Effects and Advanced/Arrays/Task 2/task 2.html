<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of Array Elements</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header class="bg-dark text-white text-center p-3 border-bottom border-5 border-warning">
        <h1>Sum of Array Elements</h1>
    </header>

    <!-- Main Section -->
    <div class="container d-flex justify-content-center align-items-center mt-5">

        <div class="card custom-card border border-4 border-primary">

            <div class="card-body text-center">

                <h3 class="mb-4">
                    Enter Numbers
                </h3>

                <!-- Input Box -->
                <input type="text"
                       id="numbers"
                       class="form-control mb-4"
                       placeholder="Enter numbers like 10,20,30">

                <!-- Button -->
                <button onclick="findSum()"
                        class="btn btn-success">
                    Calculate Sum
                </button>

                <!-- Result -->
                <h3 id="result" class="mt-4 text-success"></h3>

            </div>

        </div>

    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-3 mt-5 border-top border-5 border-warning">
        <p class="mb-0">
            © 2026 Sum Array Project
        </p>
    </footer>

    <!-- JavaScript File -->
    <script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of Array Elements</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style2.css">
</head>
<body>

    <header class="bg-dark text-white text-center p-4 border-bottom border-5 border-warning">
        <h1>Sum of Array Elements</h1>
    </header>

    <div class="container mt-5">
        <div class="row justify-content-center">

            <div class="col-md-4">

                <div class="card border-primary border-4 shadow">
                    <div class="card-body text-center">

                        <h2 class="mb-4">Enter Numbers</h2>

                        <input
                            type="text"
                            id="numbers"
                            class="form-control mb-4"
                            placeholder="Enter numbers like 10,20,30">

                        <button
                            class="btn btn-success"
                            onclick="findSum()">
                            Calculate Sum
                        </button>

                        <div id="result" class="mt-4 fw-bold"></div>

                    </div>
                </div>

            </div>

        </div>
    </div>

    <footer class="bg-dark text-white text-center p-3 mt-5 border-top border-5 border-warning">
        <p class="mb-0">© 2026 Sum Array Project</p>
    </footer>

    <script src="script2.js"></script>

</body>
</html>

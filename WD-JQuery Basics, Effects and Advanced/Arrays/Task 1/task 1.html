<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Data Modifier</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header class="bg-dark text-white text-center p-3 border-bottom border-5 border-warning">
        <h1>Fruit Data Modifier</h1>
    </header>

    <!-- Main Container -->
    <div class="container d-flex justify-content-center align-items-center mt-5">

        <div class="card custom-card border border-4 border-primary">

            <div class="card-body text-center">

                <h3 class="mb-4">Modify Fruit Array</h3>

                <!-- Array Display -->
                <div class="mb-4">
                    <label class="form-label fw-bold">Current Array:</label>

                    <div id="arrayDisplay" class="array-box">
                        ["apple", "banana", "cherry"]
                    </div>
                </div>

                <!-- Buttons -->
                <div class="d-grid gap-3">

                    <button id="addBtn" class="btn btn-success">
                        Add "orange" to End
                    </button>

                    <button id="removeBtn" class="btn btn-danger">
                        Remove First Fruit
                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-3 mt-5 border-top border-5 border-warning">
        <p class="mb-0">
            © 2026 Fruit Modifier Project
        </p>
    </footer>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>
</html>

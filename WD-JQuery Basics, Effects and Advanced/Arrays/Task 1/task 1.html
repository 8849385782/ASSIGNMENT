<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Data Modifier</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style1.css">
</head>

<body>

    <header class="bg-dark text-white text-center p-4 border-bottom border-5 border-warning">
        <h1>Fruit Data Modifier</h1>
    </header>

    <div class="container mt-5">
        <div class="row justify-content-center">

            <div class="col-md-5">

                <div class="card border-primary border-4 shadow">
                    <div class="card-body text-center">

                        <h2 class="mb-4">Modify Fruit Array</h2>

                        <h5>Current Array:</h5>

                        <div id="arrayDisplay" class="border p-3 mb-4 bg-light">
                            ["apple","banana","cherry"]
                        </div>

                        <button id="addBtn" class="btn btn-success w-100 mb-3">
                            Add "orange" to End
                        </button>

                        <button id="removeBtn" class="btn btn-danger w-100">
                            Remove First Fruit
                        </button>

                    </div>
                </div>

            </div>

        </div>
    </div>

    <footer class="bg-dark text-white text-center p-3 mt-5 border-top border-5 border-warning">
        <p class="mb-0">© 2026 Fruit Modifier Project</p>
    </footer>

    <script src="script1.js"></script>

</body>
</html>

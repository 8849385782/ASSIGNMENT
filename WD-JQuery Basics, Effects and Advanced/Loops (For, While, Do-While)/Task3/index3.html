<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop Validation Game</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg border-0 p-5 main-card">

        <h1 class="text-center fw-bold display-4 mb-4">
            Loop Validation Game
        </h1>

        <p class="text-center text-secondary fs-3 mb-5">
            Enter a number. The loop continues until you enter a number greater than 10.
        </p>

        <!-- Input Section -->
        <div class="d-flex gap-3 mb-5">

            <input type="number"
                   id="userInput"
                   class="form-control form-control-lg"
                   placeholder="Enter a number...">

            <button id="submitBtn"
                    class="btn btn-primary btn-lg px-5">
                Submit
            </button>

        </div>

        <!-- Logs Section -->
        <div class="logs-box p-4">

            <h2 class="fw-bold text-secondary mb-4">
                Execution Logs:
            </h2>

            <ul id="logList" class="list-unstyled mb-0"></ul>

        </div>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>
</html>

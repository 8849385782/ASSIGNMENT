<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greeting App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style1.css">
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card main-card border border-5 border-primary shadow-lg">

            <div class="card-body text-center p-5">

                <h1 class="display-2 fw-bold mb-5">
                    Greeting App
                </h1>

                <input type="text"
                       id="userName"
                       class="form-control form-control-lg mb-4"
                       placeholder="Enter your name">

                <button onclick="handleGreet()"
                        class="btn btn-primary btn-lg w-100 py-3">
                    Greet Me
                </button>

                <div id="resultBox"
                     class="border border-5 border-success rounded mt-5 p-5">

                    <h2 id="displayGreeting"></h2>

                </div>

            </div>

        </div>

    </div>

    <script src="script1.js"></script>

</body>

</html>

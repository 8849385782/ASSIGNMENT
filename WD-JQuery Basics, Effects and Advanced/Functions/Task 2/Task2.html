<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Sum Calculator</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          href="style.css">

</head>

<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <!-- Main Card -->
        <div class="card shadow-lg border-0 main-card p-5">

            <!-- Heading -->
            <h1 class="text-center fw-bold display-3 mb-5">
                Sum Calculator
            </h1>

            <!-- First Number -->
            <input type="number"
                   id="num1"
                   class="form-control form-control-lg mb-4"
                   placeholder="Enter first number">

            <!-- Second Number -->
            <input type="number"
                   id="num2"
                   class="form-control form-control-lg mb-4"
                   placeholder="Enter second number">

            <!-- Button -->
            <button onclick="handleCalculation()"
                    class="btn btn-primary btn-lg w-100 py-3">

                Calculate

            </button>

            <!-- Result -->
            <div id="result"
                 class="alert alert-success mt-5 text-center">

                Result:            

            </div>

        </div>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Operators Lab</title>

    <!-- Correct Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .result-box {
            font-weight: bold;
            color: #0d6efd;
        }
    </style>
</head>

<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-primary text-white text-center">
                    <h3>JS Operators Demo</h3>
                </div>

                <div class="card-body">

                    <!-- Inputs -->
                    <div class="row g-3 mb-4">

                        <div class="col">
                            <label class="form-label">Number A</label>
                            <input type="number" id="numA" class="form-control" value="15">
                        </div>

                        <div class="col">
                            <label class="form-label">Number B</label>
                            <input type="number" id="numB" class="form-control" value="4">
                        </div>

                    </div>

                    <button class="btn btn-primary w-100 mb-4" onclick="calculate()">
                        Run Operators
                    </button>

                    <!-- Arithmetic Section -->
                    <h5>Arithmetic Operators</h5>

                    <ul class="list-group mb-4">
                        <li class="list-group-item d-flex justify-content-between">
                            Addition (A + B):
                            <span id="add" class="result-box">-</span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between">
                            Subtraction (A - B):
                            <span id="sub" class="result-box">-</span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between">
                            Multiplication (A * B):
                            <span id="mul" class="result-box">-</span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between">
                            Division (A / B):
                            <span id="div" class="result-box">-</span>
                        </li>
                    </ul>

                    <!-- Comparison Section -->
                    <h5>Comparison Operators</h5>

                    <ul class="list-group mb-4">
                        <li class="list-group-item d-flex justify-content-between">
                            Equal (A == B):
                            <span id="equal" class="result-box">-</span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between">
                            Greater Than (A > B):
                            <span id="greater" class="result-box">-</span>
                        </li>
                    </ul>

                    <!-- Logical Section -->
                    <h5>Logical Operators</h5>

                    <ul class="list-group mb-2">
                        <li class="list-group-item d-flex justify-content-between">
                            (A > 10 AND B < 5):
                            <span id="logical" class="result-box">-</span>
                        </li>
                    </ul>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Link JS File -->
<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Division Checker</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card shadow p-4 division-card" style="width: 350px;">

            <h3 class="text-center mb-3">Simple Division</h3>

            <input type="number" id="num1" class="form-control mb-2" placeholder="Enter Number">

            <input type="number" id="num2" class="form-control mb-3" placeholder="Enter Divisor">

            <button class="btn btn-primary w-100" onclick="divideNumbers()">
                Divide
            </button>

            <div id="message" class="alert alert-secondary mt-3 text-center">
                Result will appear here
            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day Finder</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header class="bg-dark text-white text-center p-3 border-bottom border-5 border-warning">
        <h1>Day Finder</h1>
    </header>

    <!-- Main Section -->
    <div class="container d-flex justify-content-center align-items-center mt-5">

        <div class="card custom-card border border-5 border-primary">

            <div class="card-body text-center">

                <h2 class="mb-4">
                    Enter Day Number
                </h2>

                <!-- Input -->
                <input type="number"
                       id="dayInput"
                       class="form-control form-control-lg mb-4"
                       placeholder="Enter 1 to 7">

                <!-- Button -->
                <button onclick="getDay()"
                        class="btn btn-primary btn-lg w-100">
                    Check Day
                </button>

                <!-- Result -->
                <h1 id="result"
                    class="mt-4 text-success fw-bold">
                </h1>

            </div>

        </div>

    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-3 mt-5 border-top border-5 border-warning">
        <p class="mb-0">
            © 2026 Day Finder Project
        </p>
    </footer>

    <!-- JavaScript File -->
    <script src="script.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Checker</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header class="bg-dark text-white text-center p-3 border-bottom border-5 border-warning">
        <h1>Number Checker</h1>
    </header>

    <!-- Main Section -->
    <div class="container d-flex justify-content-center align-items-center mt-5">

        <div id="mainCard"
             class="card custom-card border border-5 border-primary">

            <div class="card-body text-center">

                <h2 class="mb-4">
                    Enter Numbers
                </h2>

                <!-- Input -->
                <input type="text"
                       id="userInput"
                       class="form-control form-control-lg mb-4"
                       placeholder="Example: 1,2,-3,4">

                <!-- Button -->
                <button onclick="checkNumber()"
                        class="btn btn-primary btn-lg w-100">
                    Check Value
                </button>

                <!-- Result -->
                <h3 id="result" class="mt-4 fw-bold"></h3>

            </div>

        </div>

    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-3 mt-5 border-top border-5 border-warning">
        <p class="mb-0">
            © 2026 Number Checker Project
        </p>
    </footer>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>

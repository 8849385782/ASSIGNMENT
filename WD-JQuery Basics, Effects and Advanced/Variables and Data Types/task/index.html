<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Types Demo</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Main Card -->
    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card shadow-lg border-0 p-5 text-center custom-card">

            <h1 class="fw-bold display-3 mb-4">
                JavaScript Data Types
            </h1>

            <p class="fs-3 text-secondary">
                Press <strong>F12</strong> and look at the 
                <strong>Console</strong> tab to view the output.
            </p>

        </div>

    </div>

    <!-- Console Section -->
    <div class="console-box container-fluid">

        <div class="console-header d-flex gap-4 px-4 py-2">

            <span>Elements</span>
            <span class="active-tab">Console</span>
            <span>Sources</span>
            <span>Network</span>
            <span>Performance</span>

        </div>

        <div class="console-content p-4" id="consoleOutput"></div>

    </div>

    <!-- JavaScript File -->
    <script src="script.js"></script>

</body>
</html>
